name: LiteLLM + AWS Bedrock Config
version: 1.0.0
schema: v1

models:
  # Primary chat model - Claude Sonnet 4.6 via LiteLLM
  - name: Claude Sonnet 4.6 (LiteLLM)
    provider: openai
    model: claude-sonnet-4-6
    apiBase: http://localhost:8001/v1
    apiKey: sk-test-1234567890
    roles:
      - chat
      - edit

  # Fast model - Claude Haiku 4.5 via LiteLLM
  - name: Claude Haiku 4.5 (LiteLLM)
    provider: openai
    model: claude-haiku-4-5
    apiBase: http://localhost:8001/v1
    apiKey: sk-test-1234567890
    roles:
      - autocomplete
      - chat
      - edit

  # Powerful model - Claude Opus 4.6 via LiteLLM
  - name: Claude Opus 4.6 (LiteLLM)
    provider: openai
    model: claude-opus-4-6
    apiBase: http://localhost:8001/v1
    apiKey: sk-test-1234567890
    roles:
      - chat
      - edit

  # Embedding model - Titan Embed Text V2 via LiteLLM
  - name: Titan Embed V2 (LiteLLM)
    provider: openai
    model: titan-embed-v2
    apiBase: http://localhost:8001/v1
    apiKey: sk-test-1234567890
    roles:
      - embed

  # Rerank model - Cohere Rerank V3.5 via LiteLLM
  - name: Cohere Rerank V3.5 (LiteLLM)
    provider: openai
    model: cohere-rerank-v3-5
    apiBase: http://localhost:8001/v1
    apiKey: sk-test-1234567890
    roles:
      - rerank

  # Kimi K2.5 - Multimodal with Agent Swarm via LiteLLM
  - name: Kimi K2.5 (LiteLLM)
    provider: openai
    model: kimi-k2-5
    apiBase: http://localhost:8001/v1
    apiKey: sk-test-1234567890
    roles:
      - chat
      - edit

  # Titan Image Generator V2 - Image generation via LiteLLM
  - name: Titan Image V2 (LiteLLM)
    provider: openai
    model: titan-image-v2
    apiBase: http://localhost:8001/v1
    apiKey: sk-test-1234567890
    roles:
      - chat
      - edit

# Context Providers - Enable '@' mentions for rich context injection
context:
  # File reference - Include specific files in context
  - provider: file

  # Code reference - Include specific functions/classes from project
  - provider: code

  # Git diff - Review changes on current branch
  - provider: diff

  # Current file - Reference the currently open file
  - provider: currentFile

  # Terminal - Reference last command and its output
  - provider: terminal

  # Open files - Reference all open files
  - provider: open
    params:
      onlyPinned: false  # Set to true to only include pinned files

  # Clipboard - Reference recent clipboard items
  - provider: clipboard

  # Tree - Reference workspace structure
  - provider: tree

  # Problems - Retrieve issues from current file
  - provider: problems

  # Debugger - Reference local variables in debugger (VS Code only)
  - provider: debugger
    params:
      stackDepth: 3  # Number of stack levels to include

  # Repository map - Reference codebase outline
  - provider: repo-map
    params:
      includeSignatures: true  # Include function/class signatures

  # Operating system - Reference architecture and platform
  - provider: os



